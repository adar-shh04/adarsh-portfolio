<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <radialGradient id="bg" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#0B101F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050914" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#818CF8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="225" x2="1200" y2="225" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="337" x2="1200" y2="337" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="450" x2="1200" y2="450" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="562" x2="1200" y2="562" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- SQL query box -->
  <rect x="56" y="56" width="580" height="68" rx="12" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
  <text x="80" y="96" font-family="'Courier New', monospace" font-size="20" fill="rgba(129,140,248,0.9)">SELECT * FROM supplements WHERE region = 'Indore'</text>
  <text x="80" y="116" font-family="'Courier New', monospace" font-size="16" fill="rgba(52,211,153,0.75)">→ 12,847 rows in 0.04s</text>

  <!-- Bar chart area -->
  <rect x="56" y="155" width="560" height="320" rx="14" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Bars -->
  <rect x="110" y="310" width="48" height="135" rx="6" fill="url(#bar2)"/>
  <rect x="190" y="270" width="48" height="175" rx="6" fill="url(#bar1)"/>
  <rect x="270" y="230" width="48" height="215" rx="6" fill="url(#bar2)"/>
  <rect x="350" y="255" width="48" height="190" rx="6" fill="url(#bar3)"/>
  <rect x="430" y="205" width="48" height="240" rx="6" fill="url(#bar1)"/>
  <rect x="510" y="240" width="48" height="205" rx="6" fill="url(#bar2)"/>

  <!-- Trend line over bars -->
  <polyline points="134,310 214,270 294,228 374,255 454,205 534,238" fill="none" stroke="#818CF8" stroke-width="2.5" stroke-dasharray="6,4" stroke-opacity="0.75"/>
  <circle cx="134" cy="310" r="5" fill="#818CF8" opacity="0.9"/>
  <circle cx="214" cy="270" r="5" fill="#818CF8" opacity="0.9"/>
  <circle cx="294" cy="228" r="5" fill="#818CF8" opacity="0.9"/>
  <circle cx="374" cy="255" r="5" fill="#818CF8" opacity="0.9"/>
  <circle cx="454" cy="205" r="5" fill="#818CF8" opacity="0.9"/>
  <circle cx="534" cy="238" r="5" fill="#818CF8" opacity="0.9"/>

  <!-- Right panel — donut / pie placeholder -->
  <rect x="648" y="56" width="500" height="420" rx="14" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="672" y="96" font-family="Inter, ui-sans-serif, system-ui" font-size="18" fill="rgba(255,255,255,0.55)" font-weight="500">Supplement Consumption by Category</text>
  <!-- Donut segments (SVG arc approximation with paths) -->
  <path d="M 898 270 L 898 190 A 80 80 0 0 1 970 310 Z" fill="rgba(99,102,241,0.65)"/>
  <path d="M 898 270 L 970 310 A 80 80 0 0 1 880 348 Z" fill="rgba(52,211,153,0.65)"/>
  <path d="M 898 270 L 880 348 A 80 80 0 0 1 820 230 Z" fill="rgba(244,114,182,0.65)"/>
  <path d="M 898 270 L 820 230 A 80 80 0 0 1 898 190 Z" fill="rgba(251,191,36,0.55)"/>
  <circle cx="898" cy="270" r="46" fill="#0B101F"/>
  <text x="898" y="276" font-family="Inter, ui-sans-serif, system-ui" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle" font-weight="600">NLP →</text>
  <text x="898" y="294" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">SQL</text>

  <!-- Legend -->
  <rect x="668" y="380" width="12" height="12" rx="3" fill="rgba(99,102,241,0.8)"/>
  <text x="686" y="392" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="rgba(255,255,255,0.6)">Protein</text>
  <rect x="760" y="380" width="12" height="12" rx="3" fill="rgba(52,211,153,0.8)"/>
  <text x="778" y="392" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="rgba(255,255,255,0.6)">Vitamins</text>
  <rect x="860" y="380" width="12" height="12" rx="3" fill="rgba(244,114,182,0.8)"/>
  <text x="878" y="392" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="rgba(255,255,255,0.6)">Creatine</text>
  <rect x="960" y="380" width="12" height="12" rx="3" fill="rgba(251,191,36,0.7)"/>
  <text x="978" y="392" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="rgba(255,255,255,0.6)">Other</text>

  <!-- Title text -->
  <text x="56" y="560" font-family="Inter, ui-sans-serif, system-ui" font-size="64" fill="rgba(255,255,255,0.92)" font-weight="700">Data Sensei</text>
  <text x="56" y="615" font-family="Inter, ui-sans-serif, system-ui" font-size="28" fill="rgba(129,140,248,0.8)" font-weight="500">Natural Language → SQL • Streamlit Dashboard</text>

  <!-- Accent dots -->
  <circle cx="1100" cy="60" r="7" fill="#818CF8" opacity="0.8"/>
  <circle cx="1128" cy="60" r="7" fill="#6366F1" opacity="0.55"/>
  <circle cx="1156" cy="60" r="7" fill="#4F46E5" opacity="0.35"/>
</svg>
